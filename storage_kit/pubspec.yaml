name: storage_kit
description: A pluggable, project-agnostic key-value storage facade for Flutter — switch between SharedPreferences and Hive (with optional encryption) through a single API, with no domain-specific assumptions.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.2

  # Community-maintained fork of Hive (the original `hive` package is no longer maintained).
  # API surface is compatible — drop-in replacement.
  hive_ce: ^2.16.0
  hive_ce_flutter: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
