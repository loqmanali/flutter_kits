name: navigation_kit
description: A project-agnostic, fully customizable bottom navigation bar for Flutter — animated indicators (underline, drop), optional floating center FAB item, RTL awareness, configurable label behavior, and a typed item interface. No host-app coupling.
version: 1.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
