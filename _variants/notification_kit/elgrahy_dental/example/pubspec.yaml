name: notification_kit_example
description: Minimal example showing how to wire notification_kit into a Flutter app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.1.6

  notification_kit:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
