name: context_menu_kit
description: A project-agnostic context menu / popup menu module for Flutter — tap or long-press to open, screen-aware positioning, nested submenus, custom item builders, and a typed item interface for fully custom rows.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
