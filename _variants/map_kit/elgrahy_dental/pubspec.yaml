name: map_kit
description: A unified map toolkit for Flutter — location picker (map + search + reverse geocoding) and delivery tracking (live driver position + OSRM routing + progress) sharing one set of dependencies, one runtime config, and one geo-point model. Project-agnostic.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Map rendering
  flutter_map: ^6.1.0
  flutter_map_cancellable_tile_provider: ^2.0.0
  latlong2: ^0.9.0

  # State management
  flutter_riverpod: ^3.1.0

  # HTTP (Nominatim geocoding + OSRM routing)
  dio: ^5.3.3

  # Polyline decoding (used by the OSRM routing service)
  flutter_polyline_points: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
