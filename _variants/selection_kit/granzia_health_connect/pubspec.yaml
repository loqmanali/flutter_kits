name: selection_kit
description: A pluggable, project-agnostic selection-control widget library for Flutter — themable AppRadioGroup / AppCheckboxGroup (and their single-tile variants) with rich options, validation, custom indicators, and a shared theme.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
