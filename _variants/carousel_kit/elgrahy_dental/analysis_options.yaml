include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # The original `examples/carousel_examples_page.dart` references symbols
    # (CarouselController, ControlledCarousel, carouselIndexProvider) that
    # were never part of the module's public API — kept for reference only.
    - lib/src/examples/**

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_single_quotes: true
