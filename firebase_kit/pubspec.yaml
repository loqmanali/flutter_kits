name: firebase_kit
description: Self-contained, project-agnostic Firebase module — auth (all methods), Firestore generic CRUD, Firebase AI, Riverpod providers, and pluggable adapters.
version: 1.0.0
publish_to: "none"
repository: https://example.com/firebase_kit

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase core SDKs (always required)
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0

  # Firebase AI Logic (Vertex AI in Firebase / Gemini)
  firebase_ai: ^2.0.0

  # State management
  flutter_riverpod: ^3.1.0

  # Functional / data
  dartz: ^0.10.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
