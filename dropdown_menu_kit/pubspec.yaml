name: dropdown_menu_kit
description: A flexible, overlay-based dropdown menu widget for Flutter with rich item types (items, labels, separators, checkboxes, radios), smart positioning, animations, optional outside-tap dismissal, and singleton-managed exclusivity.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
