name: force_update_gate
description: A drop-in Flutter widget that gates your app behind a force-update screen when a newer version is published on the App Store / Play Store. No Firebase, no backend.
version: 0.2.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  upgrader: ^13.1.0
  url_launcher: ^6.2.0
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.0
  in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
