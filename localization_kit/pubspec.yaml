name: localization_kit
description: A pluggable, project-agnostic localization toolkit for Flutter — locale state with Riverpod, persistent storage of the chosen language, optional API-driven language lists, RTL handling, and ready-made widgets. Works with any Flutter app's generated AppLocalizations.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.1.0
  equatable: ^2.0.5
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
